<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEWS GLOBE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000812; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
#hud {
  position:absolute; top:14px; left:16px;
  color:#00e5ff; pointer-events:none;
  text-shadow:0 0 10px #00e5ff;
}
#hud .title { font-size:clamp(14px,4vw,20px); font-weight:bold; letter-spacing:4px; margin-bottom:3px; }
#hud .sub   { font-size:clamp(9px,2.5vw,11px); color:#006677; letter-spacing:1px; }
#updated { position:absolute; bottom:12px; right:14px; color:#004455; font-size:clamp(9px,2vw,11px); letter-spacing:1px; pointer-events:none; }
#counter { position:absolute; bottom:12px; left:16px;  color:#004455; font-size:clamp(9px,2vw,11px); letter-spacing:1px; pointer-events:none; }
#status  {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:#00e5ff; font-size:clamp(12px,3vw,14px); letter-spacing:3px;
  text-shadow:0 0 10px #00e5ff; text-align:center; line-height:2;
  pointer-events:none;
}
</style>
</head>
<body>
<div id="hud">
  <div class="title">NEWS GLOBE</div>
  <div class="sub" id="hint">LOADING...</div>
</div>
<div id="updated"></div>
<div id="counter"></div>
<div id="status">データ取得中...<br><span style="font-size:0.8em;color:#006677">しばらくお待ちください</span></div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2          } from 'three/addons/lines/Line2.js';
import { LineGeometry   } from 'three/addons/lines/LineGeometry.js';
import { LineMaterial   } from 'three/addons/lines/LineMaterial.js';

// ================================================================
// RSS設定
// ================================================================
// 複数プロキシ（順に試す）
const PROXIES = [
  async url => {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    return (await r.json()).contents;
  },
  async url => {
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    return await r.text();
  },
  async url => {
    const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
    return await r.text();
  },
];

const RSS_FEEDS = [
  'https://www.nhk.or.jp/rss/news/cat0.xml',
  'https://www.nhk.or.jp/rss/news/cat4.xml',
  'https://www.nhk.or.jp/rss/news/cat5.xml',
  'https://www.nhk.or.jp/rss/news/cat2.xml',
  'https://www.nhk.or.jp/rss/news/cat6.xml',
  'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
];
const MAX_WORDS = 80;
const MAX_EDGES = 100;
const STOP = new Set([
  'について','による','として','ている','された','される','など','ため',
  'この','その','また','さらに','めぐり','めぐる','ことで','において',
  'に関して','よると','以上','以下','以内','以前','以降',
  '最大','最小','最高','最低','報道','発表','報告','関係','問題',
  '状況','対応','実施','予定','確認','影響','可能','必要','重要',
  '開始','終了',
]);

// ================================================================
// RSS取得
// ================================================================
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms)),
  ]);
}

function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const out = [];
  for (const item of doc.querySelectorAll('item')) {
    const title = item.querySelector('title')?.textContent?.trim();
    const linkEl = item.querySelector('link');
    let link = linkEl?.textContent?.trim() || '';
    if (!link && linkEl) link = linkEl.nextSibling?.textContent?.trim() || '';
    if (title) out.push({ title, link });
  }
  return out;
}

async function fetchRSS(url) {
  for (const proxy of PROXIES) {
    try {
      const xml   = await withTimeout(proxy(url), 12000);
      const items = parseXML(xml);
      if (items.length) return items;
    } catch { /* 次のプロキシを試す */ }
  }
  return [];
}

// ================================================================
// キーワード抽出
// ================================================================
function keywords(text) {
  const found = new Set();
  for (const m of text.matchAll(/[ァ-ヴー]{3,}/g)) found.add(m[0]);
  for (const m of text.matchAll(/[一-龯]{2,6}/g))  { if (!STOP.has(m[0])) found.add(m[0]); }
  return [...found];
}

function extractData(items) {
  // ① 単語カウント
  const counter = new Map();
  for (const { title } of items) {
    for (const m of title.matchAll(/[ァ-ヴー]{3,}/g)) counter.set(m[0], (counter.get(m[0])||0) + 2);
    for (const m of title.matchAll(/[一-龯]{2,6}/g))  {
      if (!STOP.has(m[0])) counter.set(m[0], (counter.get(m[0])||0) + 1);
    }
  }
  const sorted  = [...counter.entries()].sort((a,b)=>b[1]-a[1]).slice(0, MAX_WORDS);
  const topSet  = new Set(sorted.map(([w])=>w));
  const wordIdx = new Map(sorted.map(([w],i)=>[w,i]));

  // ② URL収集
  const wordUrl = new Map();
  for (const { title, link } of items) {
    if (!link) continue;
    for (const kw of keywords(title)) {
      if (topSet.has(kw) && !wordUrl.has(kw)) wordUrl.set(kw, link);
    }
  }

  const words = sorted.map(([text, count]) => ({
    text, count,
    url: wordUrl.get(text) || `https://news.yahoo.co.jp/search?p=${encodeURIComponent(text)}`,
  }));

  // ③ 共起カウント
  const pairCnt = new Map();
  for (const { title } of items) {
    const found = [...new Set(keywords(title).filter(w => topSet.has(w)))].sort();
    for (let i = 0; i < found.length; i++)
      for (let j = i+1; j < found.length; j++) {
        const key = found[i] + '|' + found[j];
        pairCnt.set(key, (pairCnt.get(key)||0) + 1);
      }
  }
  const edges = [...pairCnt.entries()]
    .map(([key, weight]) => { const [a,b]=key.split('|'); return {a,b,weight}; })
    .filter(e => e.weight >= 2)
    .sort((a,b)=>b.weight-a.weight)
    .slice(0, MAX_EDGES);

  return { words, edges, wordIdx };
}

// ================================================================
// スプリングレイアウト（球面上）
// ================================================================
function springLayout(words, edges, wordIdx, radius=93, iters=200) {
  const n = words.length;
  if (!n) return [];

  // Fibonacci球面で初期化
  const pts = [];
  for (let i = 0; i < n; i++) {
    const phi   = Math.acos(1 - 2*(i+0.5)/n);
    const theta = Math.PI * (1+Math.sqrt(5)) * i;
    pts.push([Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta)]);
  }

  const maxW = edges.length ? Math.max(...edges.map(e=>e.weight)) : 1;
  const adj  = new Map();
  for (const e of edges) {
    const a = wordIdx.get(e.a), b = wordIdx.get(e.b);
    if (a==null||b==null) continue;
    const key = Math.min(a,b) + '_' + Math.max(a,b);
    adj.set(key, e.weight / maxW);
  }

  const K_ATTR=0.18, K_REP=0.006;
  const forces = Array.from({length:n}, ()=>[0,0,0]);

  for (let step = 0; step < iters; step++) {
    const temp = 1 - step/iters;
    for (let i=0;i<n;i++) forces[i][0]=forces[i][1]=forces[i][2]=0;

    for (let i=0;i<n;i++) {
      for (let j=i+1;j<n;j++) {
        const dx=pts[j][0]-pts[i][0], dy=pts[j][1]-pts[i][1], dz=pts[j][2]-pts[i][2];
        const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if (dist<1e-6) continue;
        const ux=dx/dist, uy=dy/dist, uz=dz/dist;

        // 斥力
        const rep = K_REP/(dist*dist);
        forces[i][0]-=ux*rep; forces[i][1]-=uy*rep; forces[i][2]-=uz*rep;
        forces[j][0]+=ux*rep; forces[j][1]+=uy*rep; forces[j][2]+=uz*rep;

        // 引力
        const key = Math.min(i,j)+'_'+Math.max(i,j);
        if (adj.has(key)) {
          const attr = K_ATTR * adj.get(key) * dist;
          forces[i][0]+=ux*attr; forces[i][1]+=uy*attr; forces[i][2]+=uz*attr;
          forces[j][0]-=ux*attr; forces[j][1]-=uy*attr; forces[j][2]-=uz*attr;
        }
      }
    }

    for (let i=0;i<n;i++) {
      const [nx,ny,nz]=pts[i];
      const [fx,fy,fz]=forces[i];
      const dot=fx*nx+fy*ny+fz*nz;
      pts[i][0]+=(fx-dot*nx)*temp;
      pts[i][1]+=(fy-dot*ny)*temp;
      pts[i][2]+=(fz-dot*nz)*temp;
      const d=Math.sqrt(pts[i][0]**2+pts[i][1]**2+pts[i][2]**2);
      if (d>0) { pts[i][0]/=d; pts[i][1]/=d; pts[i][2]/=d; }
    }
  }
  return pts.map(p=>[p[0]*radius, p[1]*radius, p[2]*radius]);
}

// ================================================================
// Three.js セットアップ
// ================================================================
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000812);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 230;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06;
controls.minDistance=110;    controls.maxDistance=600;

// Globe
const globe = new THREE.Mesh(
  new THREE.SphereGeometry(90,40,40),
  new THREE.MeshBasicMaterial({color:0x003344,wireframe:true,transparent:true,opacity:0.11})
);
scene.add(globe);

// Rings
const addRing=(r,col,op,rx=0,ry=0)=>{
  const m=new THREE.Mesh(new THREE.TorusGeometry(r,0.3,2,100),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op}));
  m.rotation.x=rx; m.rotation.y=ry; scene.add(m);
};
addRing(90,0x006688,0.45);
addRing(90,0x002233,0.25,Math.PI/2);
addRing(90,0x002233,0.20,Math.PI/2,Math.PI/3);

// Particles
{
  const n=400, pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const ph=Math.random()*Math.PI*2, th=Math.random()*Math.PI, r=250+Math.random()*400;
    pos[i*3]=r*Math.sin(th)*Math.cos(ph); pos[i*3+1]=r*Math.cos(th); pos[i*3+2]=r*Math.sin(th)*Math.sin(ph);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x002244,size:1.0})));
}

const worldGroup = new THREE.Group();
scene.add(worldGroup);

// ================================================================
// スプライト生成
// ================================================================
function makeSprite(text, fontSize, brightness) {
  const canvas=document.createElement('canvas'), ctx=canvas.getContext('2d');
  const fs=Math.round(Math.max(11,Math.min(54,fontSize)));
  ctx.font=`bold ${fs}px "Courier New",monospace`;
  const tw=ctx.measureText(text).width;
  canvas.width=Math.ceil(tw)+28; canvas.height=fs+18;
  ctx.font=`bold ${fs}px "Courier New",monospace`;
  const g=Math.floor(80+brightness*175), b=Math.floor(80+brightness*120);
  const col=`rgba(0,${g},${b},1)`;
  ctx.shadowColor=col; ctx.shadowBlur=16; ctx.fillStyle=col;
  ctx.fillText(text,14,fs+4); ctx.shadowBlur=6; ctx.fillText(text,14,fs+4);
  const tex=new THREE.CanvasTexture(canvas);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(canvas.width*0.20, canvas.height*0.20, 1);
  return sp;
}

const resVec = new THREE.Vector2(innerWidth, innerHeight);
function makeLine2(pA, pB, lw, op, color) {
  const geo=new LineGeometry();
  geo.setPositions([pA[0],pA[1],pA[2],pB[0],pB[1],pB[2]]);
  const mat=new LineMaterial({color,linewidth:lw,transparent:true,opacity:op,depthWrite:false,resolution:resVec});
  return new Line2(geo,mat);
}

// ================================================================
// シーン更新
// ================================================================
function updateScene(words, edges, positions) {
  while(worldGroup.children.length){
    const o=worldGroup.children[0];
    if(o.geometry) o.geometry.dispose();
    if(o.material){if(o.material.map)o.material.map.dispose();o.material.dispose();}
    worldGroup.remove(o);
  }
  if(!words.length) return;

  const maxC = words[0].count;
  const posMap = new Map();

  words.forEach((w,i)=>{
    const ratio=w.count/maxC;
    const sp=makeSprite(w.text, 10+ratio*42, ratio);
    sp.position.set(...positions[i]);
    sp.userData={url:w.url, text:w.text};
    posMap.set(w.text, positions[i]);
    worldGroup.add(sp);
  });

  if(edges.length){
    const maxW=edges[0].weight;
    for(const e of edges){
      const pA=posMap.get(e.a), pB=posMap.get(e.b);
      if(!pA||!pB) continue;
      const ratio=e.weight/maxW;
      const g=Math.floor(60+ratio*140), b2=Math.floor(60+ratio*100);
      worldGroup.add(makeLine2(pA,pB, 0.6+ratio*2.9, 0.12+ratio*0.55, new THREE.Color(0,g/255,b2/255)));
    }
  }
}

// ================================================================
// データ取得・更新
// ================================================================
async function loadAndUpdate() {
  document.getElementById('status').style.display='block';
  document.getElementById('hint').textContent='LOADING...';

  const allItems = (await Promise.all(RSS_FEEDS.map(fetchRSS))).flat();
  if(!allItems.length){
    document.getElementById('status').innerHTML=
      'データ取得失敗<br><span style="font-size:0.8em;color:#006677">1分後に自動再試行します</span>';
    return;
  }

  const { words, edges, wordIdx } = extractData(allItems);
  const positions = springLayout(words, edges, wordIdx);
  updateScene(words, edges, positions);

  document.getElementById('status').style.display='none';
  document.getElementById('hint').textContent='DRAG: ROTATE  |  SCROLL: ZOOM  |  TAP: NEWS';
  document.getElementById('updated').textContent =
    'LAST UPDATE: ' + new Date().toLocaleString('ja-JP');
  document.getElementById('counter').textContent =
    `WORDS: ${words.length}  /  LINKS: ${edges.length}  /  HEADLINES: ${allItems.length}`;
}

loadAndUpdate();
setInterval(loadAndUpdate, 60000);

// ================================================================
// クリック・ホバー
// ================================================================
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function getHit(e){
  const x=e.clientX??e.touches?.[0]?.clientX;
  const y=e.clientY??e.touches?.[0]?.clientY;
  if(x==null) return null;
  mouse.x=(x/innerWidth)*2-1;
  mouse.y=-(y/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  for(const h of raycaster.intersectObjects(worldGroup.children))
    if(h.object.userData.url) return h.object;
  return null;
}

renderer.domElement.addEventListener('click', e=>{
  const sp=getHit(e);
  if(sp) window.open(sp.userData.url,'_blank');
});
renderer.domElement.addEventListener('mousemove', e=>{
  renderer.domElement.style.cursor=getHit(e)?'pointer':'default';
});

// ================================================================
// アニメーション
// ================================================================
const ROT=0.0007;
(function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y+=ROT; worldGroup.rotation.y+=ROT;
  controls.update();
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  resVec.set(innerWidth,innerHeight);
});
</script>
</body>
</html>
